###############################################################################
# hotfix-skip-env.yml
#
# NEGATIVE TEST — Demonstrates that the Linked Artifacts verification gate
# blocks deployments that skip environments.
#
# This workflow builds a NEW image and tries to deploy it directly to a
# higher environment (e.g., Staging or Production) WITHOUT deploying to
# the lower environments first.
#
# Expected result: The verification gate FAILS because no deployment
# records exist for the prior environments.
#
# This proves that enforcement isn't just workflow job ordering (`needs:`).
# The actual API-based check prevents promotion regardless of how the
# workflow is structured.
###############################################################################

name: "Hotfix: Skip Environment (Demo)"

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deploy directly to this environment (skipping lower envs)"
        required: true
        type: choice
        options:
          - QA
          - Staging
          - Production
        default: Staging

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  APP_NAME: linked-artifacts-demo

permissions: {}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD — Build a fresh image (new digest = no deployment records)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build Hotfix Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:hotfix-${{ github.sha }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: 📋 Hotfix build summary
        run: |
          echo "## 🔨 Hotfix Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tag** | \`hotfix-${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ This is a hotfix build — attempting to skip to **${{ inputs.target_environment }}**" >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY — Attempt to deploy directly to target (EXPECTED TO FAIL)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚫 Deploy to ${{ inputs.target_environment }} (will fail)"
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    permissions:
      contents: read
      artifact-metadata: write
    steps:
      - name: Checkout (for verification script)
        uses: actions/checkout@v4

      - name: Determine required prior environment
        id: prior-env
        run: |
          case "${{ inputs.target_environment }}" in
            "QA")
              echo "required=development" >> "$GITHUB_OUTPUT"
              echo "name=Dev" >> "$GITHUB_OUTPUT"
              ;;
            "Staging")
              echo "required=testing" >> "$GITHUB_OUTPUT"
              echo "name=QA" >> "$GITHUB_OUTPUT"
              ;;
            "Production")
              echo "required=staging" >> "$GITHUB_OUTPUT"
              echo "name=Staging" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: "🔒 Verify: ${{ steps.prior-env.outputs.name }} deployment exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⚠️  Attempting to deploy directly to ${{ inputs.target_environment }}..."
          echo "   This SHOULD FAIL because this artifact was never deployed to ${{ steps.prior-env.outputs.name }}."
          echo ""
          chmod +x .github/scripts/verify-deployment.sh
          .github/scripts/verify-deployment.sh \
            "${{ github.repository_owner }}" \
            "${{ needs.build.outputs.digest }}" \
            "${{ steps.prior-env.outputs.required }}"

      # These steps only run if verification somehow passes (shouldn't happen)
      - name: Simulate deployment
        if: success()
        run: |
          echo "Deploying to ${{ inputs.target_environment }}..."
          echo "✅ Deployment complete!"

      - name: Register deployment record
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOGICAL_ENV=""
          case "${{ inputs.target_environment }}" in
            "QA") LOGICAL_ENV="testing" ;;
            "Staging") LOGICAL_ENV="staging" ;;
            "Production") LOGICAL_ENV="production" ;;
          esac

          gh api -X POST \
            "orgs/${{ github.repository_owner }}/artifacts/metadata/deployment-record" \
            -f name="${{ env.APP_NAME }}" \
            -f digest="${{ needs.build.outputs.digest }}" \
            -f status="deployed" \
            -f logical_environment="$LOGICAL_ENV" \
            -f deployment_name="hotfix-deploy-${{ github.run_number }}" \
            -f github_repository="${{ github.repository }}"
